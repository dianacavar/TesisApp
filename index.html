<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Predicción Saber Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">

  <h2 class="mb-4">Formulario de Predicción Saber Pro</h2>

  <form id="formPrediccion">

    <!-- ===== DATOS DEL ESTUDIANTE ===== -->
    <div class="col-md-4 mb-3">
    <label for="ESTU_GENERO">Género</label>
    <select id="ESTU_GENERO"
            name="ESTU_GENERO"
            class="form-control"
            required>
        <option value="F">Femenino</option>
        <option value="M">Masculino</option>
    </select>
    </div>

    <div class="col-md-4 mb-3">
        <label>Municipio de residencia</label>
        <select id="ESTU_MCPIO_RESIDE" class="form-control">
            <option value="BOGOTA">Bogotá</option>
            <option value="MEDELLIN">Medellín</option>
        </select>
    </div>


    <div class="col-md-4 mb-3">
        <label>Horas semanales trabaja</label>
        <select id="ESTU_HORASSEMANATRABAJA" class="form-control">
            <option value="0">0</option>
            <option value="Menos de 10 horas">Menos de 10 horas</option>
            <option value="Entre 11 y 20 horas">Entre 11 y 20 horas</option>
            <option value="Entre 21 y 30 horas">Entre 21 y 30 horas</option>
            <option value="Más de 30 horas">Más de 30 horas</option>
        </select>
    </div>


    <div class="row">
      <div class="col-md-4 mb-3">
        <label>Estudió en el exterior</label>
        <select id="ESTU_EXTERIOR" class="form-control">
          <option value="no">no</option>
          <option value="si">si</option>
        </select>
      </div>

    <div class="col-md-4 mb-3">
    <label>Método del programa</label>
    <select id="ESTU_METODO_PRGM" class="form-control">
        <option value="DISTANCIA">Distancia</option>
        <option value="PRESENCIAL">Presencial</option>
        <option value="DISTANCIA VITUAL">Distancia virtual</option>
    </select>
    </div>


    <div class="col-md-4 mb-3">
    <label for="ESTU_COMOCAPACITOEXAMENSB11">
        ¿Cómo se capacitó para el examen Saber 11?
    </label>
    <select id="ESTU_COMOCAPACITOEXAMENSB11"
            name="ESTU_COMOCAPACITOEXAMENSB11"
            class="form-control"
            required>
        <option value="Tomó un curso de preparación">Tomó un curso de preparación</option>
        <option value="Repasó por cuenta propia">Repasó por cuenta propia</option>
        <option value="No realizó ninguna prueba de preparación">
        No realizó ninguna prueba de preparación
        </option>
    </select>
    </div>


    <!-- ===== PAGO MATRÍCULA ===== -->
    <h5 class="mt-4">Pago de Matrícula</h5>
    <div class="row">
      <div class="col-md-3 mb-3">
        <label>Crédito</label>
        <select id="ESTU_PAGOMATRICULACREDITO" class="form-control">
          <option>no</option><option>si</option>
        </select>
      </div>
      <div class="col-md-3 mb-3">
        <label>Propio</label>
        <select id="ESTU_PAGOMATRICULAPROPIO" class="form-control">
          <option>si</option><option>no</option>
        </select>
      </div>
      <div class="col-md-3 mb-3">
        <label>Padres</label>
        <select id="ESTU_PAGOMATRICULAPADRES" class="form-control">
          <option>no</option><option>si</option>
        </select>
      </div>
      <div class="col-md-3 mb-3">
        <label>Beca</label>
        <select id="ESTU_PAGOMATRICULABECA" class="form-control">
          <option>no</option><option>si</option>
        </select>
      </div>
    </div>

    <!-- ===== INSTITUCIÓN ===== -->
    <div class="col-md-6 mb-3">
    <label>Origen de la institución</label>
    <select id="INST_ORIGEN" class="form-control">
        <option value="NO OFICIAL - CORPORACIÓN">No oficial – Corporación</option>
        <option value="NO OFICIAL - FUNDACIÓN">No oficial – Fundación</option>
        <option value="OFICIAL DEPARTAMENTAL">Oficial departamental</option>
        <option value="OFICIAL MUNICIPAL">Oficial municipal</option>
        <option value="OFICIAL NACIONAL">Oficial nacional</option>
        <option value="REGIMEN ESPECIAL">Régimen especial</option>
    </select>
    </div>


    <div class="col-md-6 mb-3">
    <label>Carácter académico de la institución</label>
    <select id="INST_CARACTER_ACADEMICO" class="form-control">
        <option value="INSTITUCIÓN TECNOLÓGICA">Institución tecnológica</option>
        <option value="UNIVERSIDAD">Universidad</option>
        <option value="INSTITUCIÓN UNIVERSITARIA">Institución universitaria</option>
        <option value="TÉCNICA PROFESIONAL">Técnica profesional</option>
        <option value="INSTITUCIÓN DE EDUCACIÓN SUPERIOR">Institución de educación superior</option>
        <option value="INSTITUCION DE EDUCACION MEDIA">Institución de educación media</option>
        <option value="ESCUELA NORMAL SUPERIOR">Escuela Normal Superior</option>
    </select>
    </div>



    <!-- ===== FAMILIA ===== -->
    <h5 class="mt-4">Condiciones del hogar</h5>
    <div class="row">
      <div class="col-md-3 mb-3"><label>Automóvil</label><select id="FAMI_TIENEAUTOMOVIL" class="form-control"><option>no</option><option>si</option></select></div>
      <div class="col-md-3 mb-3"><label>Computador</label><select id="FAMI_TIENECOMPUTADOR" class="form-control"><option>si</option><option>no</option></select></div>
      <div class="col-md-3 mb-3"><label>Horno microondas</label><select id="FAMI_TIENEHORNOMICROOGAS" class="form-control"><option>si</option><option>no</option></select></div>
      <div class="col-md-3 mb-3"><label>Motocicleta</label><select id="FAMI_TIENEMOTOCICLETA" class="form-control"><option>no</option><option>si</option></select></div>
    </div>

    <div class="row">
      <div class="col-md-3 mb-3"><label>TV</label><select id="FAMI_TIENESERVICIOTV" class="form-control"><option>si</option><option>no</option></select></div>
      <div class="col-md-3 mb-3"><label>Internet</label><select id="FAMI_TIENEINTERNET" class="form-control"><option>si</option><option>no</option></select></div>
      <div class="col-md-3 mb-3"><label>Lavadora</label><select id="FAMI_TIENELAVADORA" class="form-control"><option>si</option><option>no</option></select></div>
      

    <div class="col-md-6 mb-3">
    <label>Estrato de la vivienda</label>
    <select id="FAMI_ESTRATOVIVIENDA" class="form-control">
        <option value="Sin Estrato">Sin estrato</option>
        <option value="Estrato 0">Estrato 0</option>
        <option value="Estrato 1">Estrato 1</option>
        <option value="Estrato 2">Estrato 2</option>
        <option value="Estrato 3">Estrato 3</option>
        <option value="Estrato 4">Estrato 4</option>
        <option value="Estrato 5">Estrato 5</option>
        <option value="Estrato 6">Estrato 6</option>
    </select>
    </div>





    <div class="col-md-6 mb-3">
    <label>Educación del padre</label>
    <select id="FAMI_EDUCACIONPADRE" class="form-control">
        <option value="No sabe">No sabe</option>
        <option value="No Aplica">No aplica</option>
        <option value="Ninguno">Ninguno</option>
        <option value="Primaria incompleta">Primaria incompleta</option>
        <option value="Primaria completa">Primaria completa</option>
        <option value="Secundaria (Bachillerato) incompleta">Secundaria (Bachillerato) incompleta</option>
        <option value="Secundaria (Bachilleratoato) completa">Secundaria (Bachillerato) completa</option>
        <option value="Técnica o tecnológica incompleta">Técnica o tecnológica incompleta</option>
        <option value="Técnica o tecnológica completa">Técnica o tecnológica completa</option>
        <option value="Educación profesional incompleta">Educación profesional incompleta</option>
        <option value="Educación profesional completa">Educación profesional completa</option>
        <option value="Postgrado">Postgrado</option>
    </select>
    </div>

    <div class="col-md-6 mb-3">
    <label>Educación de la madre</label>
    <select id="FAMI_EDUCACIONMADRE" class="form-control">
        <option value="No sabe">No sabe</option>
        <option value="No Aplica">No aplica</option>
        <option value="Ninguno">Ninguno</option>
        <option value="Primaria incompleta">Primaria incompleta</option>
        <option value="Primaria completa">Primaria completa</option>
        <option value="Secundaria (Bachillerato) incompleta">Secundaria (Bachillerato) incompleta</option>
        <option value="Secundaria (Bachillerato) completa">Secundaria (Bachillerato) completa</option>
        <option value="Técnica o tecnológica incompleta">Técnica o tecnológica incompleta</option>
        <option value="Técnica o tecnológica completa">Técnica o tecnológica completa</option>
        <option value="Educación profesional incompleta">Educación profesional incompleta</option>
        <option value="Educación profesional completa">Educación profesional completa</option>
        <option value="Postgrado">Postgrado</option>
    </select>
    </div>



    <div class="col-md-6 mb-3">
    <label>Valor de la matrícula universitaria</label>
    <select id="ESTU_VALORMATRICULAUNIVERSIDAD" class="form-control">
        <option value="No pagó matrícula">No pagó matrícula</option>
        <option value="Menos de 500 mil">Menos de 500 mil</option>
        <option value="Entre 500 mil y menos de 1 millón">Entre 500 mil y menos de 1 millón</option>
        <option value="Entre 1 millón y menos de 2.5 millones">Entre 1 millón y menos de 2.5 millones</option>
        <option value="Entre 2.5 millones y menos de 4 millones">Entre 2.5 millones y menos de 4 millones</option>
        <option value="Entre 4 millones y menos de 5.5 millones">Entre 4 millones y menos de 5.5 millones</option>
        <option value="Entre 5.5 millones y menos de 7 millones">Entre 5.5 millones y menos de 7 millones</option>
        <option value="Más de 7 millones">Más de 7 millones</option>
    </select>
    </div>


    <button id="btnPredecir" class="btn btn-primary mt-3">Predecir</button>
  </form>

  <div id="resultadoPrediccion" class="alert alert-success mt-4 d-none"></div>

</div>

<script>
document.getElementById("btnPredecir").addEventListener("click", function(e) {
  e.preventDefault();

  const data = {};
  document.querySelectorAll("select, input").forEach(el => {
    data[el.id] = el.value;
  });

  fetch("http://127.0.0.1:5000/predict", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(result => {
    const div = document.getElementById("resultadoPrediccion");
    div.classList.remove("d-none");
    div.innerHTML = `
      <h5>Resultado de la predicción</h5>
      <p><strong></strong> ${result.label}</p>
    `;
  })
  .catch(() => {
    alert("Error al obtener la predicción");
  });
});
</script>

</body>
</html>
